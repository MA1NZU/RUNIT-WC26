<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – FootballPicks</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">⚽</div>
      <h1>Football<span>Picks</span></h1>
      <p>Predict matches. Climb the ranks.</p>
    </div>

    <!-- Tab switcher -->
    <div class="tab-switcher">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="error-msg" class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <!-- LOGIN FORM -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="login-btn">
        Login
      </button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signup-form" style="display:none" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="signup-username" placeholder="coolkicker99" required
               minlength="3" maxlength="20">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="signup-btn">
        Create Account
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
</body>
<script>
function switchTab(tab) {
  console.log("Switching to:", tab); // This will show in Console
  const loginForm = document.getElementById('login-form');
  const signupForm = document.getElementById('signup-form');
  const tabs = document.querySelectorAll('.tab-btn');

  if (tab === 'login') {
    loginForm.style.display = 'block';
    signupForm.style.display = 'none';
    tabs[0].classList.add('active');
    tabs[1].classList.remove('active');
  } else {
    loginForm.style.display = 'none';
    signupForm.style.display = 'block';
    tabs[0].classList.remove('active');
    tabs[1].classList.add('active');
  }
}
</script>
</html>
