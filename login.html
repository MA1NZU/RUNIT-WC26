<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – FootballPicks</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-box">

    <div class="login-logo">
      <div class="icon">⚽</div>
      <h1>Football<span>Picks</span></h1>
      <p>Predict matches. Climb the ranks.</p>
    </div>

    <div class="tab-switcher">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="error-msg"   class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <!-- LOGIN -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="login-btn">
        Login
      </button>
    </form>

    <!-- SIGNUP -->
    <form id="signup-form" style="display:none" onsubmit="handleSignup(event)">

      <!-- Username with live preview -->
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="signup-username"
               placeholder="How you'll appear on the leaderboard"
               required minlength="2" maxlength="20"
               oninput="updateUsernamePreview(this.value)">
        <div id="username-preview" style="display:none; margin-top:8px;
             background:var(--dark-3); border:1px solid var(--border);
             border-radius:8px; padding:10px 14px; font-size:0.85rem;
             color:var(--text-muted)">
          You'll appear as: <strong id="preview-name" style="color:var(--green)"></strong>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password"
               placeholder="Min 6 characters" required minlength="6">
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="signup-confirm"
               placeholder="Repeat your password" required minlength="6">
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%" id="signup-btn">
        Create Account
      </button>

      <p style="text-align:center; margin-top:16px; font-size:0.8rem; color:var(--text-muted)">
        By signing up you agree to play fair 🤝
      </p>
    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>

<!-- Extra login-page logic -->
<script>
  function updateUsernamePreview(val) {
    const preview = document.getElementById('username-preview');
    const name    = document.getElementById('preview-name');
    if (val.trim().length > 0) {
      preview.style.display = 'block';
      name.textContent = val.trim();
    } else {
      preview.style.display = 'none';
    }
  }
</script>

</body>
</html>
