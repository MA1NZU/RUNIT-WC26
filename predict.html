<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predict – RUNIT WC26</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="predict.html" class="nav-logo">RUNIT WC26</a>
  <div class="nav-links">
    <a href="predict.html" class="active">Predict</a>
    <a href="leaderboard.html">Leaderboard</a>
    <!-- Admin button is hidden by default, shown by JS if admin -->
    <a href="admin.html" id="admin-nav-btn" 
       style="display:none; background:var(--green); color:#000; font-weight:700">
      ⚙️ Admin
    </a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Make Your <span>Predictions</span></h1>
    <p id="user-greeting">Loading...</p>
  </div>

  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat-box">
      <div class="stat-num" id="stat-points">0</div>
      <div class="stat-label">My Points</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-predicted">0</div>
      <div class="stat-label">Predicted</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-rank">#–</div>
      <div class="stat-label">My Rank</div>
    </div>
  </div>

  <div id="matches-container">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading matches...</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script src="js/predict.js"></script>

</body>
</html>
